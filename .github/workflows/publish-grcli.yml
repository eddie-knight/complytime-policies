# SPDX-License-Identifier: Apache-2.0
---
# yamllint disable rule:line-length
# Publishes selected policy bundles to grc.store via grcli.
#
# To publish a new release of a bundle:
#   1. Bump `metadata.version` in the relevant source YAML.
#   2. Dispatch this workflow with the bundle's checkbox set.
#
# Re-publishing the same metadata.version will fail — versions are
# immutable. Bump the version each time you want to push a change.

name: Publish to grc.store

"on":
  workflow_dispatch:
    inputs:
      ampel_branch_protection:
        description: "Publish ampel-branch-protection bundle"
        required: false
        type: boolean
        default: true
      cis_fedora_l1_server:
        description: "Publish cis-fedora-l1-server bundle"
        required: false
        type: boolean
        default: true
      cis_fedora_l1_workstation:
        description: "Publish cis-fedora-l1-workstation bundle"
        required: false
        type: boolean
        default: true

concurrency:
  group: publish-grcli
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish selected bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install grcli
        # Pinned to a specific release rather than :latest so this
        # workflow doesn't change behavior unexpectedly when a new
        # grcli ships. Bump deliberately after reviewing the release notes.
        run: |
          oras pull ghcr.io/revanite-io/grcli:v0.1.2 --platform linux/amd64
          sudo install grcli /usr/local/bin/grcli

      - name: Publish selected bundles via grcli
        env:
          AMPEL: ${{ inputs.ampel_branch_protection }}
          CIS_SERVER: ${{ inputs.cis_fedora_l1_server }}
          CIS_WORKSTATION: ${{ inputs.cis_fedora_l1_workstation }}
        run: |
          set -euo pipefail

          published=()

          publish_bundle() {
            local bundle_file="$1"
            local bundle_name
            bundle_name="$(basename "${bundle_file}" .yaml)"

            echo "::group::${bundle_name}"
            while IFS= read -r layer; do
              layer="$(echo "${layer}" | sed 's/^[[:space:]]*-[[:space:]]*//')"
              [ -z "${layer}" ] && continue
              if [ ! -f "${layer}" ]; then
                echo "::warning::Layer file not found: ${layer} (bundle: ${bundle_name})"
                continue
              fi
              # grcli prints the full published coordinate (including
              # version) on success — see the step group for the exact tag.
              echo "Publishing ${layer}..."
              grcli publish -f "${layer}"
              published+=("${layer}")
            done < <(grep -E '^\s*-\s+' "${bundle_file}")
            echo "::endgroup::"
          }

          if [ "${AMPEL}" = "true" ]; then
            publish_bundle bundles/ampel-branch-protection.yaml
          fi

          if [ "${CIS_SERVER}" = "true" ]; then
            publish_bundle bundles/cis-fedora-l1-server.yaml
          fi

          if [ "${CIS_WORKSTATION}" = "true" ]; then
            publish_bundle bundles/cis-fedora-l1-workstation.yaml
          fi

          if [ ${#published[@]} -eq 0 ]; then
            echo "::warning::No bundles were selected for publishing."
            exit 0
          fi

          {
            echo "### Published to grc.store"
            echo
            echo "| File |"
            echo "|------|"
            for f in "${published[@]}"; do
              echo "| \`${f}\` |"
            done
            echo
            echo "_Tag = each file's \`metadata.version\`._"
          } >> "${GITHUB_STEP_SUMMARY}"
